<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>dovizovic.cz – rotovaný náhled</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
  }

  /* Wrapper drží původní rozměry 1080×1920 a ořezává přetok */
  .stage {
    width: 500px;
    height: 1200px;
    overflow: hidden;
    position: relative;

    /* Celý stage otočíme o 90° — výsledná vizuální plocha bude 1920×1080 px */
    transform: rotate(90deg);
    transform-origin: center center;

    /*
      Po rotaci o 90° potřebujeme posunout stage tak,
      aby byl viditelný ve středu obrazovky.
      Vizuální šířka se stane 1920, výška 1080 — kompenzujeme offset.
    */
    margin: calc((500px - 1200px) / 2) calc((1200px - 500px) / 2);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .overlay-label {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.08em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="stage">
  <iframe
    src="https://dovizovic.cz/"
    title="dovizovic.cz"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    loading="lazy"
  ></iframe>
  <div class="overlay-label">1080 × 1920 px</div>
</div>

</body>
</html>
