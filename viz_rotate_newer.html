<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>dovizovic.cz – rotovaný náhled</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1280px;   /* vizuální šířka = původní výška */
    height: 720px;   /* vizuální výška = původní šířka */
    overflow: hidden;
  }

  .stage {
    width: 720px;
    height: 1280px;
    position: absolute;
    /* střed stage = střed výsledného viewportu */
    top:  calc((720px - 1280px) / 2);   /* -280px */
    left: calc((1280px - 720px) / 2);   /* +280px */
    transform: rotate(90deg);
    transform-origin: center center;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
<div class="stage">
  <iframe
    src="https://dovizovic.cz/"
    title="dovizovic.cz"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    loading="lazy"
  ></iframe>
</div>
</body>
</html>
